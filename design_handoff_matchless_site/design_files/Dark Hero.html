  // -------- Panel (right-side chat-style card) --------
  function Panel() {
    const [tab, setTab] = useState(T.activeTab || "BUILD");
    const tabs = ["STRATEGY", "BUILD", "DEPLOY"];

    const prompts = {
      STRATEGY: { q: "Where should we focus to win?", chips: [
        {icon: <Icon.Download/>, label: "Market Audit"},
        {icon: <Icon.Sparkles/>, label: "Positioning"}
      ]},
      BUILD: { q: "How can we scale your revenue?", chips: [
        {icon: <Icon.Download/>, label: "Funnel Architecture"},
        {icon: <Icon.Sparkles/>, label: "SEO Mastery"}
      ]},
      DEPLOY: { q: "What ships in the first 30 days?", chips: [
        {icon: <Icon.Download/>, label: "Launch Plan"},
        {icon: <Icon.Sparkles/>, label: "Analytics Setup"}
      ]},
    };
    const current = prompts[tab];

    const services = [
      { label: "WEB", icon: <Icon.Globe/> },
      { label: "CMS", icon: <Icon.Layers/> },
      { label: "SEO", icon: <Icon.Search/> },
      { label: "CRM", icon: <Icon.Users/> },
    ];

    return (
      <div className="panel">
        <div className="panel-avatars">
          <div className="panel-avatar"><AvatarA/></div>
          <div className="panel-avatar"><AvatarB/></div>
          <div className="panel-avatar"><AvatarC/></div>
        </div>
        <div className="panel-tabs" role="tablist">
          {tabs.map(t => (
            <button key={t} className={`panel-tab ${tab === t ? 'active' : ''}`} onClick={() => setTab(t)} role="tab" aria-selected={tab === t}>
              {t}
            </button>
          ))}
        </div>
        <div className="panel-prompt">
          <div className="prompt-text">{current.q}</div>
          <div className="prompt-chips">
            {current.chips.map((c, i) => (
              <button key={i} className="prompt-chip">{c.icon}{c.label}</button>
            ))}
          </div>
        </div>
        <div className="panel-services">
          {services.map(s => (
            <div key={s.label} className="service-pill">
              <span className="service-dot">{s.icon}</span>
              <span className="service-label">{s.label}</span>
            </div>
          ))}
        </div>
      </div>
    );
  }

  // -------- Hero --------
  function Hero() {
    // Render headline lines, replacing {accent} with the accent span.
    const renderLine = (tpl) => {
      const parts = tpl.split(/(\{accent\})/g);
      return parts.map((p, i) => p === "{accent}"
        ? <span key={i} className="accent">{T.accentWord}</span>
        : <React.Fragment key={i}>{p}</React.Fragment>
      );
    };

    return (
      <section className="hero-wrap">
        <div className="hero">
          <div className="hero-grid">
            <div className="hero-left">
              <div className="hero-eyebrow">
                <span className="hero-eyebrow-text">Client Acquisition Systems</span>
                <span className="hero-eyebrow-divider"/>
                <a href="#cases" className="hero-eyebrow-link">Read our case studies</a>
              </div>

              <h1 className="hero-title">
                {renderLine(T.headlineLine1)}<br/>
                {renderLine(T.headlineLine2)}<br/>
                {renderLine(T.headlineLine3)}
              </h1>

              <p className="hero-sub">
                Deep insights, creative velocity, and full execution.<br/>
                All powered by engineered web architectures.
              </p>

              <div className="hero-divider"/>

              <div className="hero-proof">
                <div style={{display:'flex', alignItems:'center', gap:14}}>
                  <span className="proof-avatar"><AvatarProof/></span>
                  <span className="proof-text">
                    <div className="proof-title">200% Growth on Average</div>
                    <div className="proof-sub">B2B &amp; Agencies</div>
                  </span>
                </div>
                <div className="proof-rating">
                  <Icon.Star/> 4.9
                </div>
              </div>

              <div className="hero-actions">
                <a href="#start" className="btn btn-primary btn-lg">
                  Start the protocol
                  <span className="btn-arrow"><Icon.ArrowRight/></span>
                </a>
                <a href="#solutions" className="btn btn-ghost btn-lg">Explore Solutions</a>
              </div>
            </div>

            <div className="hero-right">
              <Panel/>
            </div>
          </div>

          <div className="hero-scroll" aria-hidden="true">
            <Icon.ChevronDown/>
          </div>
        </div>
      </section>
    );
  }

  // -------- Tweaks panel (dev-only controls) --------
  function TweaksPanel({ open }) {
    const [vals, setVals] = useState(T);
    const update = (key, val) => {
      const next = { ...vals, [key]: val };
      setVals(next);
      window.__TWEAKS__[key] = val;
      window.parent && window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
      // Re-render
      window.__rerender && window.__rerender();
    };
    return (
      <div className={`tweaks ${open ? 'open' : ''}`}>
        <h4>Tweaks</h4>
        <div className="tweak-row">
          <label>Accent word</label>
          <input type="text" value={vals.accentWord} onChange={e => update('accentWord', e.target.value)}/>
        </div>
        <div className="tweak-row">
          <label>Active tab</label>
          <select value={vals.activeTab} onChange={e => update('activeTab', e.target.value)}>
            <option>STRATEGY</option><option>BUILD</option><option>DEPLOY</option>
          </select>
        </div>
        <div className="tweak-row">
          <label>Line 1</label>
          <input type="text" value={vals.headlineLine1} onChange={e => update('headlineLine1', e.target.value)}/>
        </div>
        <div className="tweak-row">
          <label>Line 2</label>
          <input type="text" value={vals.headlineLine2} onChange={e => update('headlineLine2', e.target.value)}/>
        </div>
        <div className="tweak-row">
          <label>Line 3</label>
          <input type="text" value={vals.headlineLine3} onChange={e => update('headlineLine3', e.target.value)}/>
        </div>
      </div>
    );
  }
